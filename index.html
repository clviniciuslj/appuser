<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Layouts Alternativos</title>
<style>
body{font-family:Arial;margin:0;padding:10px;}
.container{display:flex;flex-direction:column;gap:10px;}

.quadras-wrapper{display:flex;flex-direction:column;gap:10px;}
.quadra-card{padding:10px;border:1px solid #ccc;border-radius:10px;}

.fila-section{padding:10px;border:1px solid #ccc;border-radius:10px;}

/* Layouts */

body.l1 .quadras-wrapper{flex-direction:row;overflow-x:auto}
body.l2 .container{flex-direction:row}
body.l2 .quadras-wrapper{flex:2}
body.l2 .fila-section{flex:1}

body.l3 .quadra-card{padding:20px;border-radius:20px}

body.l4 .quadras-wrapper{display:block}
body.l4 .quadra-card{display:flex;justify-content:space-between}

body.l5 .fila-section{order:-1}

button{position:fixed;bottom:20px;left:20px;padding:10px;border-radius:10px;}
</style>
</head>
<body class="l1">

<button onclick="trocar()">Trocar Layout</button>

<div class="container">
<div class="quadras-wrapper">
<div class="quadra-card">Quadra 1</div>
<div class="quadra-card">Quadra 2</div>
<div class="quadra-card">Quadra 3</div>
</div>

<div class="fila-section">
Fila de espera
</div>
</div>

<script>
let i=1;
function trocar(){
 i=i>=5?1:i+1;
 document.body.className="l"+i;
}
</script>

</body>
</html>
